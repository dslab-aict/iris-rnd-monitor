name: IRIS RND Announcement Scraper

on:
  schedule:
    # GitHub Actions uses UTC. 15:00 UTC = 00:00 KST next day.
    - cron: '0 15 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run IRIS scraper
        env:
          IRIS_OUTPUT_CSV: data/iris_announcements.csv
          IRIS_MAX_PAGES: '10'
          IRIS_HEADLESS: 'true'
        run: python -m src.iris_scraper

      - name: Commit CSV if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/iris_announcements.csv
          if git diff --staged --quiet; then
            echo "No CSV changes."
          else
            git commit -m "Update IRIS announcements $(TZ=Asia/Seoul date +'%Y-%m-%d')"
            git push
          fi
