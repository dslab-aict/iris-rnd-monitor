name: IRIS RND Announcement Scraper

on:
  schedule:
    # GitHub Actions uses UTC. 15:00 UTC = 00:00 KST next day.
    - cron: '0 15 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONPATH: src

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run IRIS scraper
        env:
          IRIS_OUTPUT_CSV: data/iris_announcements.csv
          IRIS_MAX_PAGES: '7'
          IRIS_HEADLESS: 'true'
          IRIS_FAIL_ON_ZERO: 'true'
        run: python -m iris_scraper

      - name: Show CSV status
        if: always()
        run: |
          echo "CSV status"
          ls -la data || true
          test -f data/iris_announcements.csv && wc -l data/iris_announcements.csv || true
          test -f data/iris_announcements.csv && tail -n 5 data/iris_announcements.csv || true
          echo "Git status"
          git status --short

      - name: Commit CSV if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/iris_announcements.csv
          if git diff --staged --quiet; then
            echo "No CSV changes. This usually means all scraped announcements already exist in the CSV."
          else
            git commit -m "Update IRIS announcements $(TZ=Asia/Seoul date +'%Y-%m-%d')"
            git push
          fi
