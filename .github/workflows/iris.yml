name: IRIS RND Scraper

on:
  workflow_dispatch:
  schedule:
    # 00:00 Asia/Seoul == 15:00 UTC previous day
    - cron: "0 15 * * *"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run tests
        env:
          PYTHONPATH: src
        run: |
          python -m pip install pytest
          python -m pytest -q

      - name: Scrape IRIS
        env:
          PYTHONPATH: src
          IRIS_MAX_PAGES: "1"
        run: |
          python -m iris_scraper --csv data/iris_announcements.csv --max-pages "$IRIS_MAX_PAGES"
          echo "--- CSV preview ---"
          python - <<'PY'
          from pathlib import Path
          p = Path('data/iris_announcements.csv')
          print('exists=', p.exists(), 'size=', p.stat().st_size if p.exists() else 0)
          for line in p.read_text(encoding='utf-8-sig').splitlines()[:8]:
              print(line)
          PY

      - name: Upload debug HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: iris-debug-html
          path: debug_iris_page*.html
          if-no-files-found: ignore

      - name: Commit CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git status --short
          git add data/iris_announcements.csv
          if git diff --staged --quiet; then
            echo "No CSV changes to commit. Usually all scraped records are already present."
          else
            git commit -m "Update IRIS announcements"
            git push
          fi
